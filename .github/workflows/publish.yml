name: publish

# Publishes the package to npm when a `v*` tag is pushed (e.g. `git tag v1.0.1
# && git push --tags`). Requires NPM_TOKEN to be set in the repo's Secrets.
# Skips automatically if the tag's version doesn't match package.json.

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json $PKG_VERSION"
            exit 1
          fi

      - name: Run tests before publishing
        run: npm test

      - name: Check NPM_TOKEN availability
        id: token
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning ::NPM_TOKEN secret not set — skipping npm publish. Tag is still recorded as a GitHub release; publish manually with 'npm publish' when ready."
          fi

      - name: Publish
        if: steps.token.outputs.available == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
